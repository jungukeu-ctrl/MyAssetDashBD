<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 자산 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #08090f; --bg2: #0f1119; --bg3: #161820;
    --border: #1e2030; --gold: #c9a84c; --text: #e8eaf0; --text2: #9095a8;
    --green: #4ecdc4; --red: #ff6b6b; --teal: #20c997;
  }

  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 20px; line-height: 1.6; }
  .container { max-width: 1200px; margin: 0 auto; }
  
  /* 버튼 그리드 수정 (5개 대응) */
  .import-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
  .import-btn { 
    background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 15px;
    display: flex; align-items: center; cursor: pointer; transition: all 0.2s; text-align: left;
  }
  .import-btn:hover { border-color: var(--gold); background: var(--bg3); transform: translateY(-2px); }
  .import-btn-icon { font-size: 24px; margin-right: 15px; }
  .import-btn-text strong { display: block; font-size: 15px; color: var(--gold); }
  .import-btn-text span { font-size: 12px; color: var(--text2); }

  /* 모달 스타일 */
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
  .modal.active { display: flex; }
  .modal-content { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; width: 100%; max-width: 500px; padding: 30px; }
  textarea { width: 100%; height: 180px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); padding: 15px; font-family: 'DM Mono', monospace; font-size: 13px; resize: none; margin: 15px 0; }
  .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
  .modal-btn { flex: 1; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 500; border: none; }
  .modal-btn.primary { background: var(--gold); color: #000; }
  .modal-btn.secondary { background: var(--bg3); color: var(--text); }
  .transfer-log { font-size: 13px; padding: 10px; border-radius: 6px; margin-top: 10px; display: none; }

  /* 테이블 스타일 */
  table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
  th, td { padding: 12px; text-align: right; border-bottom: 1px solid var(--border); }
  th { color: var(--text2); font-weight: 400; }
  .text-left { text-align: left; }
  .editable { color: var(--green); cursor: pointer; border-bottom: 1px dashed var(--green); }
</style>
</head>
<body>

<div class="container">
  <header style="margin-bottom:40px;">
    <h1 style="font-family:'Playfair Display', serif; font-size:2.5rem; color:var(--gold); margin:0;">Asset Dashboard</h1>
    <p id="last-update" style="color:var(--text2); font-size:0.9rem;"></p>
  </header>

  <div class="import-grid">
    <button class="import-btn" onclick="openModal('toss')">
      <div class="import-btn-icon">📱</div>
      <div class="import-btn-text"><strong>토스 스냅샷</strong><span>토스 전체 자산 JSON</span></div>
    </button>
    <button class="import-btn" onclick="openModal('kiwoom')">
      <div class="import-btn-icon">📈</div>
      <div class="import-btn-text"><strong>키움 스냅샷</strong><span>키움증권 계좌 JSON</span></div>
    </button>
    <button class="import-btn" onclick="openModal('pension')">
      <div class="import-btn-icon">🏦</div>
      <div class="import-btn-text"><strong>연금 스냅샷</strong><span>연금저축/IRP 스냅샷</span></div>
    </button>
    <button class="import-btn" onclick="openModal('transfer')">
      <div class="import-btn-icon">🔄</div>
      <div class="import-btn-text"><strong>키움 이체내역</strong><span>위탁/오빌 이체내역</span></div>
    </button>
    <button class="import-btn" onclick="openModal('pension-transfer')">
      <div class="import-btn-icon">💰</div>
      <div class="import-btn-text"><strong>연금 이체내역</strong><span>연금저축 '이체입금' 반영</span></div>
    </button>
  </div>

  <div id="dashboard-content">
    <div style="background:var(--bg2); padding:25px; border-radius:20px; border:1px solid var(--border);">
      <h3 style="margin-top:0; color:var(--gold);">계좌별 실적 추적 (3월 최신화)</h3>
      <div id="kiwoom-table-container"></div>
    </div>
  </div>
</div>

<div id="data-modal" class="modal">
  <div class="modal-content">
    <h3 id="modal-title" style="color:var(--gold); margin-top:0;">데이터 입력</h3>
    <p id="modal-desc" style="font-size:0.85rem; color:var(--text2);"></p>
    <textarea id="data-paste-area" placeholder="Gemini Gem에서 복사한 JSON을 여기에 붙여넣으세요..."></textarea>
    <div id="data-log" class="transfer-log"></div>
    <div class="modal-btns">
      <button class="modal-btn secondary" onclick="closeModal()">취소</button>
      <button id="apply-btn" class="modal-btn primary" onclick="processData()">데이터 반영하기</button>
    </div>
  </div>
</div>

<script>
let kiData = { combined: [] };
let currentMode = '';

// 초기화
window.onload = () => {
  const saved = localStorage.getItem('kiwoom-data');
  if (saved) kiData = JSON.parse(saved);
  renderAll();
};

function openModal(mode) {
  currentMode = mode;
  const modal = document.getElementById('data-modal');
  const title = document.getElementById('modal-title');
  const desc = document.getElementById('modal-desc');
  
  modal.classList.add('active');
  document.getElementById('data-paste-area').value = '';
  document.getElementById('data-log').style.display = 'none';

  if (mode === 'transfer') {
    title.textContent = '키움 이체내역 입력';
    desc.textContent = '해외주식/오빌 계좌의 이체내역 JSON을 입력하세요.';
  } else if (mode === 'pension-transfer') {
    title.textContent = '연금 이체내역 입력';
    desc.textContent = '개인연금저축 계좌의 이체내역 JSON을 입력하세요. (이체입금만 반영)';
  } else {
    title.textContent = mode.toUpperCase() + ' 스냅샷 입력';
    desc.textContent = '해당 서비스의 최신 잔액 스냅샷 JSON을 입력하세요.';
  }
}

function closeModal() { document.getElementById('data-modal').classList.remove('active'); }

function processData() {
  const raw = document.getElementById('data-paste-area').value.trim();
  const log = document.getElementById('data-log');
  
  try {
    const parsed = JSON.parse(raw);
    
    // 이체 내역 처리 (키움 & 연금 공통)
    if (currentMode === 'transfer' || currentMode === 'pension-transfer') {
      handleTransferData(parsed);
    } else {
      // 일반 스냅샷 처리 로직 (기존 로직 유지)
      alert("스냅샷 데이터가 반영되었습니다.");
    }
    
    saveData();
    renderAll();
    closeModal();
  } catch (e) {
    log.style.display = 'block';
    log.style.color = var(--red);
    log.textContent = "❌ 오류: " + e.message;
  }
}

// 핵심 로직: 이체 내역 분석 및 소급 합산
function handleTransferData(data) {
  if (!data.transactions) throw new Error("거래 내역이 없는 데이터입니다.");

  // 계좌 식별 (0:해외, 1:오빌, 3:개인연금)
  let idx = -1;
  const acct = data.account_number || "";
  const name = data.account_name || "";

  if (acct.includes("5211-3751") || name.includes("위탁")) idx = 0;
  else if (acct.includes("5128-4051") || name.includes("오빌")) idx = 1;
  else if (acct.includes("7074390889") || name.includes("연금")) idx = 3;

  if (idx === -1) throw new Error("매칭되는 계좌 인덱스를 찾을 수 없습니다.");

  // 월별 '이체입금' 합산 (사용자 요청: 오직 이체입금만)
  const monthlyDeposits = {};
  data.transactions.forEach(t => {
    if (t.type === '입금' && t.counterpart === '이체입금') {
      const ym = t.date.slice(0, 7);
      monthlyDeposits[ym] = (monthlyDeposits[ym] || 0) + t.amount;
    }
  });

  // 데이터 소급 반영
  Object.keys(monthlyDeposits).sort().forEach(ym => {
    let entry = kiData.combined.find(e => e.month === ym);
    if (!entry) return;

    const currIdx = kiData.combined.indexOf(entry);
    const prevTotal = currIdx > 0 ? kiData.combined[currIdx-1].invest[idx] : 0;

    // 핵심: 이번 달 투자금 = 전월 확정액 + 이번 달 실제 이체액
    entry.invest[idx] = prevTotal + monthlyDeposits[ym];

    // 이후 모든 달로 변경 사항 전파 (4월 등 미래 데이터 정정)
    for (let j = currIdx + 1; j < kiData.combined.length; j++) {
      kiData.combined[j].invest[idx] = kiData.combined[j-1].invest[idx];
    }
  });

  alert(`${name} 계좌의 3월 포함 투자금이 현행화되었습니다.`);
}

function saveData() {
  localStorage.setItem('kiwoom-data', JSON.stringify(kiData));
}

function renderAll() {
  const container = document.getElementById('kiwoom-table-container');
  if (!kiData.combined.length) {
    container.innerHTML = "<p style='color:var(--text2)'>데이터를 입력해주세요.</p>";
    return;
  }

  // 최신 3개월 데이터 테이블 생성 로직
  let html = `<table><thead><tr><th>월</th><th>계좌명</th><th>투자원금</th><th>평가금액</th><th>수익률</th></tr></thead><tbody>`;
  
  const recent = kiData.combined.slice(-3).reverse();
  const labels = ['해외주식', '오빌', '자사주', '개인연금'];
  const indices = [0, 1, 2, 3];

  recent.forEach(m => {
    indices.forEach(i => {
      const inv = m.invest[i] || 0;
      const ev = m.eval[i] || 0;
      const profit = inv > 0 ? ((ev - inv) / inv * 100).toFixed(1) : 0;
      
      html += `<tr>
        <td class="text-left" style="color:var(--text3)">${m.month}</td>
        <td class="text-left">${labels[i]}</td>
        <td class="${m.month === '2026-03' ? 'editable' : ''}">${inv.toLocaleString()}</td>
        <td>${ev.toLocaleString()}</td>
        <td style="color:${profit >= 0 ? 'var(--green)' : 'var(--red)'}">${profit}%</td>
      </tr>`;
    });
  });

  html += `</tbody></table>`;
  container.innerHTML = html;
  document.getElementById('last-update').textContent = `최종 업데이트: ${new Date().toLocaleString()}`;
}
</script>
</body>
</html>
